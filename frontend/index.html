<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LODANA | Energy Distribution Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div id="dashboard">
        <header>
            <img src="LOGO_Lodana.png">
            <div class="header-content">
                <p>Solar Energy Prediction & Distribution System | Sumba Timur</p>
            </div>
            <div id="api-status">
                <span class="status-dot"></span> API: <span id="status-text">Checking...</span>
            </div>
        </header>

        <main>
            <!-- Control Section -->
            <section class="controls-card">
                <div class="input-group">
                    <label for="total-area">Total Solar Area (m²):</label>
                    <input type="number" id="total-area" value="50000" step="5000">
                    <button id="run-btn">Generate Distribution Plan</button>
                </div>
            </section>

            <!-- Summary Cards -->
            <section class="summary-grid">
                <div class="card summary-card">
                    <h3>Total Production</h3>
                    <p class="value"><span id="total-prod">-</span> <small>kWh</small></p>
                </div>
                <div class="card summary-card">
                    <h3>Total Surplus</h3>
                    <p class="value text-success"><span id="total-surplus">-</span> <small>kWh</small></p>
                </div>
                <div class="card summary-card">
                    <h3>Total Deficit</h3>
                    <p class="value text-danger"><span id="total-deficit">-</span> <small>kWh</small></p>
                </div>
                <div class="card summary-card">
                    <h3>Avg Utilization</h3>
                    <p class="value"><span id="avg-utilization">-</span> <small>%</small></p>
                </div>
            </section>

            <!-- Chart Section -->
            <section class="chart-container card">
                <h2>Supply vs Demand Comparison</h2>
                <div class="canvas-wrapper">
                    <canvas id="distributionChart"></canvas>
                </div>
            </section>

            <!-- Table Section -->
            <section class="table-container card">
                <h2>District Distribution Details</h2>
                <div class="overflow-auto">
                    <table id="distribution-table">
                        <thead>
                            <tr>
                                <th>District</th>
                                <th>Supply (kWh)</th>
                                <th>Demand (kWh)</th>
                                <th>Utilization (%)</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Rows injected here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
